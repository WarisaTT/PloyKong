name: 🚀 Deploy PloyKong to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ploykong-api

jobs:
  # ─── 1. Test Backend ──────────────────────────────────────────────
  test-backend:
    name: 🧪 Test Go Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run tests
        working-directory: ./backend
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Vet code
        working-directory: ./backend
        run: go vet ./...

  # ─── 2. Build & Test Frontend ────────────────────────────────────
  test-frontend:
    name: 🎨 Build Vue Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.ploykong.com/api/v1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist
          retention-days: 1

  # ─── 3. Deploy to VPS ────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.ploykong.com

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,backend/,database/,nginx/,frontend/dist/"
          target: "/opt/ploykong"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/ploykong

            echo "📦 Pulling latest changes..."
            
            echo "🏗️  Building and starting containers..."
            docker compose pull || true
            docker compose build --no-cache api
            docker compose up -d --remove-orphans
            
            echo "⏳ Waiting for API to be healthy..."
            sleep 15
            
            echo "🔍 Checking health..."
            curl -f http://localhost:3000/health || exit 1
            
            echo "🧹 Cleaning up old images..."
            docker system prune -f --volumes --filter "until=24h"
            
            echo "✅ Deployment successful!"
            docker compose ps

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 PloyKong deployed successfully to https://app.ploykong.com"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED"
