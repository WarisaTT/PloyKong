name: 🚀 Deploy PloyKong

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ─── Build Frontend ────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          # แก้ YOUR_VPS_IP เป็น IP จริง หรือใส่ใน GitHub Secrets
          VITE_API_URL: http://${{ secrets.VPS_HOST }}:8082/api/v1
          VITE_APP_URL: http://${{ secrets.VPS_HOST }}:5173
          VITE_PORTFOLIO_BASE_URL: http://${{ secrets.VPS_HOST }}:5173/p/{slug}

      # ─── Copy files to VPS ────────────────────────────────────
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,backend/,database/,frontend/dist/"
          target: "/opt/ploykong"
          overwrite: true

      # ─── Deploy ───────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/ploykong

            # สร้าง .env ถ้ายังไม่มี
            if [ ! -f .env ]; then
              cat > .env << ENVEOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=ploykong
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ALLOWED_ORIGINS=http://${{ secrets.VPS_HOST }}:5173,http://${{ secrets.VPS_HOST }}:8082
            ENVEOF
            fi

            docker compose build --no-cache api
            docker compose up -d --remove-orphans
            sleep 15
            curl -f http://localhost:8082/health || exit 1
            echo "✅ Deploy สำเร็จ!"
            echo "🌐 API: http://${{ secrets.VPS_HOST }}:8082"
