# ════════════════════════════════════════════════════════════════════
# PloyKong — Nginx Configuration
# Handles: API, App Frontend, Wildcard Portfolio Subdomains
# ════════════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ─── HTTP → HTTPS Redirect ────────────────────────────────────────────
    server {
        listen 80;
        server_name ploykong.com *.ploykong.com app.ploykong.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Main App: app.ploykong.com ───────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name app.ploykong.com;

        ssl_certificate     /etc/letsencrypt/live/ploykong.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ploykong.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        root /var/www/frontend/dist;
        index index.html;

        # Vue SPA routing — serve index.html for all frontend routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── API: api.ploykong.com ────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.ploykong.com;

        ssl_certificate     /etc/letsencrypt/live/ploykong.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ploykong.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Rate limit auth routes
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api:3000;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # Rate limit general API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api:3000;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # Health check (no rate limit)
        location /health {
            proxy_pass http://api:3000;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # Uploads (serve static files directly)
        location /uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public";
        }
    }

    # ─── Wildcard Portfolio: *.ploykong.com ───────────────────────────────
    # Each user's portfolio slug is the subdomain
    # e.g., napat.ploykong.com → shows Napat's portfolio
    server {
        listen 443 ssl http2;
        server_name ~^(?P<slug>[^.]+)\.ploykong\.com$;

        ssl_certificate     /etc/letsencrypt/live/ploykong.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ploykong.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Skip if the subdomain is 'app' or 'api'
        if ($slug ~* "^(app|api|www|mail|ftp|admin)$") {
            return 404;
        }

        location / {
            # Forward to API which renders the portfolio
            proxy_pass http://api:3000;
            proxy_set_header X-Portfolio-Slug $slug;
            include /etc/nginx/conf.d/proxy_params.conf;

            # Or serve the Vue SPA which then fetches /api/v1/public/p/:slug
            # try_files $uri /index.html;
        }
    }
}
