  <script>
    (function () {
      const saved = localStorage.getItem("theme") || "dark";
      const systemLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      let theme = saved;
      if (saved === "auto" || saved === "system") {
        theme = systemLight ? "light" : "dark";
      }
      document.documentElement.className = "theme-" + theme;

      // Inline style to prevent white flash
      const bg = (theme === "dark" || theme === "purple") ? "#050814" : "#faf7ff";
      const color = (theme === "dark" || theme === "purple") ? "#e2e8f0" : "#000000";
      const style = document.createElement('style');
      style.innerHTML = `html, body { background-color: ${bg} !important; color: ${color}; }`;
      document.head.appendChild(style);
    })();
  </script>
